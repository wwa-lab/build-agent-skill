  <!-- Chain strip -->
  <g transform="translate(70 1960)">
    <rect class="soft" x="0" y="0" width="1300" height="82" rx="14"/>
    <text x="28" y="34" class="h3">一句话总结</text>
    <text x="180" y="34" class="body">workflow-orchestrator.skill 是 IBM i Skill Family 的“调度台”：</text>
    <text x="180" y="64" class="body">让需求、规格、代码、DDS、Review、UT 在正确顺序里接力，少走弯路，也少冒险。</text>
    <text x="1080" y="50" class="mono">V1.1</text>
  </g>
</svg>
