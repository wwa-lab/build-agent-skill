    <text x="190" y="135" class="small">Routing Decision</text>
    <text x="380" y="135" class="small">Spec / Code / DDS / Tests</text>
    <line class="thin" x1="0" y1="156" x2="560" y2="156"/>
    <text x="20" y="187" class="mini">原则</text>
    <text x="190" y="187" class="small">最早且足够安全</text>
    <text x="380" y="187" class="small">按模板深度产出</text>
  </g>

  <!-- How to use -->
  <g filter="url(#shadow)">
    <rect class="card" x="70" y="1630" width="650" height="300" rx="14"/>
  </g>
  <text x="100" y="1685" class="h2">如何使用这个 Skill？</text>
  <g transform="translate(105 1735)">
    <circle class="lav" cx="40" cy="40" r="38"/><text x="30" y="51" class="h2">1</text>
    <text x="0" y="98" class="h3">给材料</text>
    <text x="18" y="124" class="small">材料</text>
    <path class="line" d="M88 40 L122 40" marker-end="url(#arrow)"/>
    <circle class="cyan" cx="162" cy="40" r="38"/><text x="152" y="51" class="h2">2</text>
    <text x="122" y="98" class="h3">说明目标</text>
    <text x="140" y="124" class="small">目标</text>
    <path class="line" d="M210 40 L244 40" marker-end="url(#arrow)"/>
    <circle class="green" cx="284" cy="40" r="38"/><text x="274" y="51" class="h2">3</text>
    <text x="244" y="98" class="h3">得到路由</text>
    <text x="252" y="124" class="small">下一 Skill</text>
    <path class="line" d="M332 40 L366 40" marker-end="url(#arrow)"/>
    <circle class="yellow" cx="406" cy="40" r="38"/><text x="396" y="51" class="h2">4</text>
    <text x="366" y="98" class="h3">通过门禁</text>
    <text x="382" y="124" class="small">Review</text>
    <path class="line" d="M454 40 L488 40" marker-end="url(#arrow)"/>
    <circle class="pink" cx="528" cy="40" r="38"/><text x="518" y="51" class="h2">5</text>
    <text x="488" y="98" class="h3">继续交付</text>
    <text x="504" y="124" class="small">继续</text>
  </g>

  <!-- Ecosystem -->
  <g filter="url(#shadow)">
    <rect class="card" x="750" y="1630" width="620" height="300" rx="14"/>
  </g>
  <text x="780" y="1685" class="h2">与技能生态的关系</text>
  <g transform="translate(780 1730)">
